<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#ea580c" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Rounded Base Canvas with Elegant Gradient -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid/Pattern Element in background -->
  <g opacity="0.12">
    <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="3" />
    <circle cx="256" cy="256" r="170" fill="none" stroke="#ffffff" stroke-width="2" />
    <line x1="256" y1="0" x2="256" y2="512" stroke="#ffffff" stroke-width="2" />
    <line x1="0" y1="256" x2="512" y2="256" stroke="#ffffff" stroke-width="2" />
  </g>

  <!-- Main Billing/Doc Shape with Drop Shadow -->
  <g filter="url(#shadow)">
    <!-- Elegant White Bill/Invoice Page -->
    <rect x="146" y="126" width="220" height="260" rx="32" fill="#ffffff" />
    
    <!-- Invoice Checklist Lines & Graphics -->
    <!-- Brand Line (Primary Orange) -->
    <rect x="186" y="176" width="100" height="16" rx="8" fill="#ea580c" />
    <!-- Secondary Subheading line -->
    <rect x="186" y="206" width="60" height="10" rx="5" fill="#cbd5e1" />
    
    <!-- Row Item 1 (Aesthetic detail) -->
    <rect x="186" y="246" width="140" height="10" rx="5" fill="#94a3b8" />
    
    <!-- Decorative Stamp/Seal (Signifying billing success) -->
    <circle cx="305" cy="205" r="20" fill="#f97316" fill-opacity="0.15" />
    <circle cx="305" cy="205" r="14" fill="#ea580c" />
    <path d="M299 205 l4 4 l8 -8" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Row Item 2 -->
    <rect x="186" y="278" width="90" height="10" rx="5" fill="#e2e8f0" />
    
    <!-- Fine dashed itemizer list divider -->
    <line x1="184" y1="312" x2="328" y2="312" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round" />
    
    <!-- Total Summary Badge (Dark business tag) -->
    <rect x="186" y="334" width="70" height="18" rx="9" fill="#1e293b" />
    <!-- Mini green total-paid dot -->
    <circle cx="316" cy="343" r="10" fill="#14b8a6" />
  </g>
</svg>
